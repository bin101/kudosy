services:
  kudosy:
    # Use GHCR image:
    #image: ghcr.io/bin101/kudosy:latest
    # Or build locally:
    build: .
    container_name: kudosy
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      TZ: Europe/Berlin
      KUDOSY_LOG_LEVEL: INFO
      # Override port if needed:
      # KUDOSY_PORT: "8080"
