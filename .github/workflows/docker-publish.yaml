name: Docker — Build & Push (reusable)

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref (tag) to check out, e.g. v0.3.0"
        required: true
        type: string
      version:
        description: "Full semver without leading v, e.g. 0.3.0"
        required: true
        type: string
      major_minor:
        description: "Major.minor only, e.g. 0.3"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bin101/kudosy

jobs:
  build-and-push:
    name: Build multi-arch image and push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=${{ inputs.major_minor }}
            type=raw,value=latest,enable=${{ !contains(inputs.version, '-') }}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
