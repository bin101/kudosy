name: Release — Build & Push Docker Image (manual tag)

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  derive:
    name: Derive version from tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      major_minor: ${{ steps.v.outputs.major_minor }}
    steps:
      - id: v
        name: Extract version numbers
        run: |
          # Strip leading 'v' from tag (v0.1.0 → 0.1.0)
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "major_minor=${VERSION%.*}" >> "$GITHUB_OUTPUT"

  build:
    name: Build & push Docker image
    needs: derive
    uses: ./.github/workflows/docker-publish.yaml
    permissions:
      contents: read
      packages: write
    with:
      ref: ${{ github.ref_name }}
      version: ${{ needs.derive.outputs.version }}
      major_minor: ${{ needs.derive.outputs.major_minor }}
